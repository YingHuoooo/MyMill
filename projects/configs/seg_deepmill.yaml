SOLVER:
  gpu: 0,
  run: train
  type: sgd
  best_val: max:mIoU

  logdir: logs/seg_shapenet/02691156_airplane_d5
  max_epoch: 300
  test_every_epoch: 10
  visualize: False

  # lr_type: cos
  milestones: (120,180,240)
  ckpt_num: 20

DATA:
  train:
    name: shapenet

    # octree building
    depth: 5
    full_depth: 2

    # transformation
    orient_normal: xyz

    # data augmentations
    distort: False
    angle: (0, 5, 0)
    interval: (1, 1, 1)
    scale: 0.25
    jitter: 0.25
    uniform: True

    # data loading
    location: data/points
    filelist: data/filelist/10_train_val.txt
    batch_size: 8
    shuffle: True
    # num_workers: 0

  test:
    name: shapenet

    # octree building
    depth: 5
    full_depth: 2

    # transformation
    orient_normal: xyz

    # data augmentations
    distort: False   # False -> no data augmentation
    angle: (0, 5, 0)
    interval: (1, 1, 1)
    scale: 0.25
    jitter: 0.25
    uniform: True

    # data loading
    location: data/points
    filelist: data/filelist/10_test.txt
    batch_size: 1
    shuffle: True
    # num_workers: 0

MODEL:
  name: segnet
  conditioning: concat  # concat, film, film_skip, or film_both
  film_scale: 1.0
  feature: ND   # N -> Normal(3 channels);
                # D -> Local displacement(1 channel)
  upsample: 'nearest'   # The method used for upsampling
  interp:   'linear'    # The interplation method: linear or nearest
  stages: 3
  channel: 4
  nout: 4


LOSS:
  mask: -1
  num_class: 2
  name: ce
  red_risk_class: 0
  green_risk_class: 1
  risk_class_weight: 1.0
  fn_penalty_weight: 0.0
  calib_weight: 0.0

CALIB:
  mc_samples: 8
  alpha: 0.1
  cp_method: threshold
  crc_alpha: 0.05
  red_crc_alpha: 0.03
  green_crc_alpha: 0.05
  temperature_scaling: False
  temperature_min: 0.5
  temperature_max: 5.0
  temperature_steps: 91
  adaptive_crc: False
  adaptive_crc_bins: 2
  adaptive_crc_score: entropy
  calibration_ratio: 0.2
  split_mode: random
  split_seed: 123
  risk_class: 1
  red_risk_class: 0
  green_risk_class: 1
  save_point_npz: False
